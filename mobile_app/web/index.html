<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="FlexMe — AI-powered photo enhancement, template-based image generation, and AI story series. Create stunning content for social media.">

  <!-- Open Graph -->
  <meta property="og:title" content="FlexMe — AI Photo & Story Creator">
  <meta property="og:description" content="Create stunning AI-enhanced photos, templates, and story series. Your creative flex starts here.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://flexme-now.web.app">
  <meta property="og:image" content="https://flexme-now.web.app/icons/Icon-512.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="FlexMe — AI Photo & Story Creator">
  <meta name="twitter:description" content="AI-powered photo enhancement and story generation for social media.">
  <meta name="twitter:image" content="https://flexme-now.web.app/icons/Icon-512.png">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FlexMe">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Theme color for browser chrome -->
  <meta name="theme-color" content="#F59E0B">

  <title>FlexMe — AI Photo & Story Creator</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
